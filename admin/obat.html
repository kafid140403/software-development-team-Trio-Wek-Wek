<!DOCTYPE html>
<html>

<head>

    <title>Data Obat</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>
<div class="modal fade" id="obatModal">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">
                <h5>Tambah Obat</h5>
            </div>

            <div class="modal-body">

                <input
                    type="text"
                    id="nama_obat"
                    class="form-control mb-2"
                    placeholder="Nama Obat">

                <textarea
                    id="fungsi"
                    class="form-control mb-2"
                    placeholder="Fungsi"></textarea>

                <textarea
                    id="aturan_pakai"
                    class="form-control mb-2"
                    placeholder="Aturan Pakai"></textarea>

                <textarea
                    id="keterangan"
                    class="form-control"
                    placeholder="Keterangan"></textarea>

            </div>

            <div class="modal-footer">

                <button
                    class="btn btn-success"
                    onclick="tambahObat()">

                    Simpan

                </button>

            </div>

        </div>

    </div>

</div>
<div class="modal fade" id="editObatModal">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">
                <h5>Edit Obat</h5>
            </div>

            <div class="modal-body">

                <input type="hidden" id="edit_id">

                <input
                    type="text"
                    id="edit_nama_obat"
                    class="form-control mb-2">

                <textarea
                    id="edit_fungsi"
                    class="form-control mb-2"></textarea>

                <textarea
                    id="edit_aturan_pakai"
                    class="form-control mb-2"></textarea>

                <textarea
                    id="edit_keterangan"
                    class="form-control"></textarea>

            </div>

            <div class="modal-footer">

                <button
                    class="btn btn-success"
                    onclick="updateObat()">

                    Simpan

                </button>

            </div>

        </div>

    </div>

</div>
<body>

<div class="container mt-4">

    <h2>Data Obat</h2>

    <button
        class="btn btn-primary mb-3"
        data-bs-toggle="modal"
        data-bs-target="#obatModal">

        Tambah Obat

    </button>

    <table class="table table-bordered">

        <thead>

            <tr>
                <th>ID</th>
                <th>Nama Obat</th>
                <th>Fungsi</th>
                <th>Aturan Pakai</th>
                <th>Keterangan</th>
                <th>Aksi</th>
            </tr>

        </thead>

        <tbody id="obatTable"></tbody>

    </table>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="obat.js"></script>

</body>
</html>
