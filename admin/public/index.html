<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet">

<style>

body{
    background:#f4f6f9;
}

.sidebar{
    width:250px;
    height:100vh;
    position:fixed;
    background:#0d6efd;
    color:white;
}

.sidebar h4{
    padding:20px;
    text-align:center;
}

.sidebar a{
    display:block;
    color:white;
    padding:15px 20px;
    text-decoration:none;
}

.sidebar a:hover{
    background:rgba(255,255,255,0.2);
}

.content{
    margin-left:250px;
    padding:30px;
}

.card{
    border:none;
    border-radius:15px;
}

</style>

</head>

<body>

<div class="sidebar">

    <h4>Admin Panel</h4>

    <a href="index.html">
        <i class="bi bi-speedometer2"></i>
        Dashboard
    </a>

    <a href="users.html">
        <i class="bi bi-people"></i>
        Users
    </a>

    <a href="dokter.html">
        <i class="bi bi-person-badge"></i>
        Dokter
    </a>

    <a href="jadwal.html">
        <i class="bi bi-calendar-event"></i>
        Jadwal Dokter
    </a>

    <a href="obat.html">
        <i class="bi bi-capsule"></i>
        Obat
    </a>

    <a href="konsultasi.html">
        <i class="bi bi-chat-dots"></i>
        Konsultasi
    </a>

</div>

<div class="content">

    <h2 class="mb-4">
        Dashboard Admin Chatbot Kesehatan
    </h2>

    <div class="row g-4">

        <div class="col-md-3">

            <div class="card shadow">

                <div class="card-body text-center">

                    <i class="bi bi-people-fill fs-1 text-primary"></i>

                    <h5>Total User</h5>

                    <h2 id="total_users">0</h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card shadow">

                <div class="card-body text-center">

                    <i class="bi bi-person-badge-fill fs-1 text-success"></i>

                    <h5>Total Dokter</h5>

                    <h2 id="total_dokter">0</h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card shadow">

                <div class="card-body text-center">

                    <i class="bi bi-capsule-pill fs-1 text-danger"></i>

                    <h5>Total Obat</h5>

                    <h2 id="total_obat">0</h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card shadow">

                <div class="card-body text-center">

                    <i class="bi bi-chat-left-text-fill fs-1 text-warning"></i>

                    <h5>Konsultasi</h5>

                    <h2 id="total_konsultasi">0</h2>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="dashboard.js"></script>

</body>
</html>
