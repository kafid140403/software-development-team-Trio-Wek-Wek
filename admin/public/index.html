<!DOCTYPE html>
<html>

<head>

    <title>Dashboard Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-4">

    <h2>Dashboard Admin Chatbot Kesehatan</h2>

    <div class="row mt-4">

        <div class="col-md-3">

            <div class="card text-center">

                <div class="card-body">

                    <h5>Total User</h5>

                    <h2 id="total_users">0</h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card text-center">

                <div class="card-body">

                    <h5>Total Dokter</h5>

                    <h2 id="total_dokter">0</h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card text-center">

                <div class="card-body">

                    <h5>Total Obat</h5>

                    <h2 id="total_obat">0</h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card text-center">

                <div class="card-body">

                    <h5>Konsultasi</h5>

                    <h2 id="total_konsultasi">0</h2>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="dashboard.js"></script>

</body>
</html>
