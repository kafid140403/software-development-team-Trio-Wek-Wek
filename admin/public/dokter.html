<!DOCTYPE html>
<html>

<head>

    <title>Data Dokter</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>
<div class="modal fade" id="editDokterModal">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">
                <h5>Edit Dokter</h5>
            </div>

            <div class="modal-body">

                <input
                    type="hidden"
                    id="edit_id">

                <input
                    type="text"
                    id="edit_nama_dokter"
                    class="form-control mb-2">

                <input
                    type="text"
                    id="edit_spesialis"
                    class="form-control mb-2">

                <input
                    type="text"
                    id="edit_no_hp"
                    class="form-control mb-2">

                <select
                    id="edit_status_aktif"
                    class="form-control">

                    <option value="Aktif">
                        Aktif
                    </option>

                    <option value="Nonaktif">
                        Nonaktif
                    </option>

                </select>

            </div>

            <div class="modal-footer">

                <button
                    class="btn btn-success"
                    onclick="updateDokter()">

                    Simpan

                </button>

            </div>

        </div>

    </div>

</div>

<body>

<div class="container mt-4">

    <h2>Data Dokter</h2>

    <button
        class="btn btn-primary mb-3"
        data-bs-toggle="modal"
        data-bs-target="#dokterModal">

        Tambah Dokter

    </button>

    <table class="table table-bordered">

        <thead>

        <tr>
            <th>ID</th>
            <th>Nama Dokter</th>
            <th>Spesialis</th>
            <th>No HP</th>
            <th>Status</th>
            <th>Aksi</th>
        </tr>

        </thead>

        <tbody id="dokterTable">

        </tbody>

    </table>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="dokter.js"></script>
<div class="modal fade" id="dokterModal">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">
                <h5>Tambah Dokter</h5>
            </div>

            <div class="modal-body">

                <input
                    type="text"
                    id="nama_dokter"
                    class="form-control mb-2"
                    placeholder="Nama Dokter">

                <input
                    type="text"
                    id="spesialis"
                    class="form-control mb-2"
                    placeholder="Spesialis">

                <input
                    type="text"
                    id="no_hp"
                    class="form-control mb-2"
                    placeholder="No HP">

                <select
                    id="status_aktif"
                    class="form-control">

                    <option value="Aktif">
                        Aktif
                    </option>

                    <option value="Nonaktif">
                        Nonaktif
                    </option>

                </select>

            </div>

            <div class="modal-footer">

                <button
                    class="btn btn-success"
                    onclick="tambahDokter()">

                    Simpan

                </button>

            </div>

        </div>

    </div>

</div>
</body>
</html>
